name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify versions match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          SCRIPT_VERSION=$(grep '^VERSION=' install.sh | head -1 | cut -d'"' -f2)
          echo "Tag: $TAG | plugin.json: $PLUGIN_VERSION | install.sh: $SCRIPT_VERSION"
          if [ "$PLUGIN_VERSION" != "$TAG" ] || [ "$SCRIPT_VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch. Update .claude-plugin/plugin.json and VERSION in install.sh to match the tag."
            exit 1
          fi

  github-release:
    runs-on: ubuntu-latest
    needs: check-versions
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
